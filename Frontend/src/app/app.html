<!-- Full Width Layout for Landing/Login/Signup -->
<div *ngIf="!showLayout" class="min-h-screen bg-gradient-to-br from-gray-950 via-blue-950 to-gray-950">
  <router-outlet></router-outlet>
</div>

<!-- Dashboard Layout with Sidebar -->
<div *ngIf="showLayout" class="flex h-screen bg-gradient-to-br from-gray-950 via-blue-950 to-gray-950 text-gray-100">

  <!-- Sidebar -->
  <aside class="w-72 bg-gradient-to-b from-gray-900 to-gray-950 border-r border-blue-900/30 flex flex-col shadow-2xl">
    
    <!-- Logo Section -->
    <div class="p-8 border-b border-blue-900/20">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex items-center justify-center font-bold text-white">
          📈
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
          StockPro
        </h1>
      </div>
      <p class="text-xs text-gray-500 mt-2">Portfolio Management System</p>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
      <a routerLink="/dashboard" 
         routerLinkActive="active-nav"
         class="nav-link group flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-300 hover:bg-blue-900/20">
        <span class="text-lg">📊</span>
        <span class="font-medium group-hover:text-blue-300">Dashboard</span>
      </a>

      <a routerLink="/holdings"
         routerLinkActive="active-nav"
         class="nav-link group flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-300 hover:bg-blue-900/20">
        <span class="text-lg">💼</span>
        <span class="font-medium group-hover:text-blue-300">Holdings</span>
      </a>

      <a routerLink="/transactions"
         routerLinkActive="active-nav"
         class="nav-link group flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-300 hover:bg-blue-900/20">
        <span class="text-lg">💳</span>
        <span class="font-medium group-hover:text-blue-300">Transactions</span>
      </a>

      <a routerLink="/marketdata"
         routerLinkActive="active-nav"
         class="nav-link group flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-300 hover:bg-blue-900/20">
        <span class="text-lg">📱</span>
        <span class="font-medium group-hover:text-blue-300">Market Data</span>
      </a>

      <a routerLink="/analytics"
         routerLinkActive="active-nav"
         class="nav-link group flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-300 hover:bg-blue-900/20">
        <span class="text-lg">📈</span>
        <span class="font-medium group-hover:text-blue-300">Analytics</span>
      </a>

      <a routerLink="/reports"
         routerLinkActive="active-nav"
         class="nav-link group flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-300 hover:bg-blue-900/20">
        <span class="text-lg">📋</span>
        <span class="font-medium group-hover:text-blue-300">Reports</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="p-6 border-t border-blue-900/20">
      <div class="bg-blue-900/10 rounded-lg p-4 mb-4">
        <p class="text-xs text-gray-400">Portfolio Status</p>
        <p class="text-lg font-bold text-green-400 mt-1">+₹ 25,000</p>
        <p class="text-xs text-gray-500">+25% this month</p>
      </div>
      <p class="text-xs text-gray-500 text-center">© 2026 StockPro</p>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Top Navbar -->
    <header class="h-20 bg-gradient-to-r from-gray-900 to-gray-800 border-b border-blue-900/20 flex items-center justify-between px-8 shadow-lg">
      <div class="flex items-center space-x-4">
        <h1 class="text-2xl font-bold text-white">Live Market Dashboard</h1>
      </div>
      
      <div class="flex items-center space-x-6">
        <div class="flex items-center space-x-2 bg-blue-900/20 px-4 py-2 rounded-lg">
          <span class="text-sm text-gray-400">Portfolio Value:</span>
          <span class="text-xl font-bold text-blue-300">₹ 1,25,000</span>
        </div>
        
        <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-cyan-500 rounded-full flex items-center justify-center font-bold text-white cursor-pointer hover:shadow-lg hover:shadow-blue-500/50 transition-all">
          👤
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-8 bg-gradient-to-b from-gray-950 to-blue-950/20">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
