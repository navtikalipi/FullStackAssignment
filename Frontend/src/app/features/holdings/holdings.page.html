<div class="space-y-8">

  <!-- Header Section -->
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-4xl font-bold text-white mb-2">Holdings</h1>
      <p class="text-gray-400">Your current stock holdings</p>
    </div>
    <!-- Portfolio Selector -->
    <select 
      *ngIf="portfolios.length > 0"
      [(ngModel)]="selectedPortfolioId" 
      (ngModelChange)="onPortfolioChange()"
      class="bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500">
      <option *ngFor="let p of portfolios" [value]="p.id">{{ p.portfolioName }}</option>
    </select>
  </div>

  <!-- No Portfolio State -->
  <div *ngIf="portfolios.length === 0 && !loading" class="bg-gray-800 rounded-2xl p-12 text-center">
    <div class="text-6xl mb-4">📊</div>
    <h2 class="text-2xl font-bold text-white mb-2">No Portfolio Found</h2>
    <p class="text-gray-400">Create a portfolio to view your holdings!</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="flex justify-center items-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
  </div>

  <!-- Info Message -->
  <div *ngIf="selectedPortfolioId" class="bg-blue-900/20 border border-blue-500/30 rounded-xl p-6">
    <div class="flex items-center space-x-3">
      <span class="text-2xl">💡</span>
      <div>
        <h3 class="text-white font-semibold">Holdings from Dashboard</h3>
        <p class="text-gray-400 text-sm">Your complete holdings summary is available on the Dashboard page with P&L calculations.</p>
      </div>
    </div>
  </div>

</div>
