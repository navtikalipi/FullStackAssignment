<div class="p-6 space-y-6">

  <h1 class="text-2xl font-bold text-gray-800">Analytics</h1>

  <div class="grid md:grid-cols-2 gap-6">

    <!-- PnL Summary -->
    <div class="bg-white shadow rounded-xl p-5">
      <h2 class="font-semibold mb-3">P&L Summary</h2>
      <p>Total Gain: ₹ {{ pnlData?.totalGain }}</p>
      <p>Total Loss: ₹ {{ pnlData?.totalLoss }}</p>
    </div>

    <!-- Top Movers -->
    <div class="bg-white shadow rounded-xl p-5">
      <h2 class="font-semibold mb-3">Top Movers</h2>

      <div *ngFor="let stock of movers"
           class="flex justify-between py-2 border-b text-sm">
        <span>{{ stock.symbol }}</span>
        <span [ngClass]="stock.change >= 0 ? 'text-green-600' : 'text-red-600'">
          {{ stock.change }}%
        </span>
      </div>
    </div>

  </div>

</div>
