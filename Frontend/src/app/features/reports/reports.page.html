<div class="p-6 space-y-6">

  <h1 class="text-2xl font-bold text-gray-800">Reports</h1>

  <div class="bg-white shadow rounded-xl p-6 space-y-4 w-96">

    <button (click)="loadSummary()"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
      Load Summary
    </button>

    <button (click)="downloadCSV()"
            class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
      Download CSV
    </button>

    <div *ngIf="summary" class="text-sm text-gray-600">
      <p>Total Investment: ₹ {{ summary.totalInvestment }}</p>
      <p>Total Value: ₹ {{ summary.currentValue }}</p>
      <p>Total P&L: ₹ {{ summary.totalPnL }}</p>
    </div>

  </div>

</div>
