<div class="p-6 space-y-6">

  <h1 class="text-2xl font-bold text-gray-800">Transactions</h1>

  <!-- Table -->
  <div class="bg-white shadow rounded-xl overflow-hidden">

    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50 text-left text-sm font-medium text-gray-600">
        <tr>
          <th class="px-6 py-3">Symbol</th>
          <th class="px-6 py-3">Type</th>
          <th class="px-6 py-3">Quantity</th>
          <th class="px-6 py-3">Price</th>
          <th class="px-6 py-3">Date</th>
          <th class="px-6 py-3">Action</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100 text-sm">
        <tr *ngFor="let tx of transactions">
          <td class="px-6 py-4 font-medium">{{ tx.symbol }}</td>
          <td class="px-6 py-4"
              [ngClass]="tx.type === 'BUY' ? 'text-green-600' : 'text-red-600'">
            {{ tx.type }}
          </td>
          <td class="px-6 py-4">{{ tx.quantity }}</td>
          <td class="px-6 py-4">₹ {{ tx.price }}</td>
          <td class="px-6 py-4">{{ tx.date }}</td>
          <td class="px-6 py-4">
            <button (click)="deleteTransaction(tx.id)"
                    class="text-red-500 hover:text-red-700">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>

</div>
