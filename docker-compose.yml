version: '3.8'
services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - market_data
      - payment
  market_data:
    build:
      context: ./Backend
      dockerfile: Dockerfile.market_data
    command: python market_data_server.py
    ports:
      - "5000:5000"
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8080
  payment:
    build:
      context: ./PaymentMicroService
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - db
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: example_password
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"
