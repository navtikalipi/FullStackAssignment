spring:
  application:
    name: portfolio

  datasource:
    url: jdbc:mysql://localhost:3306/stockdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT Configuration
jwt:
  secret: bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25BbmRWYWxpZGF0aW9uMjAyNFNlY3VyZUtleQ==
  expiration: 86400000

# Server Configuration
server:
  port: 8080
