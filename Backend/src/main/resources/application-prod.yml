spring:
  profiles:
    active: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  datasource:
    url: jdbc:mysql://localhost:3306/stockdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

server:
  port: 8080
  ssl:
    enabled: false

logging:
  level:
    root: INFO
    com.tnc: INFO
